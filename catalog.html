<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог Hot Wheels</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="logo.png" alt="Hot Wheels Logo" onerror="this.style.display='none'">
                <span>Hot Wheels</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                    <li class="nav-item"><a class="nav-link active" href="catalog.html">Каталог</a></li>
                    <li class="nav-item"><a class="nav-link" href="order.html">Предзаказ</a></li>
                    <li class="nav-item"><a class="nav-link" href="ransom.html">Выкуп</a></li>
                </ul>
                <div class="nav-icons">
                    <a href="favorites.html" class="nav-icon">
                        <i class="far fa-heart"></i>
                        <span class="badge favorites-count">0</span>
                    </a>
                    <a href="cart.html" class="nav-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="badge cart-count">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Хлебные крошки -->
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="index.html">Главная</a></li>
                <li class="breadcrumb-item active">Каталог</li>
            </ol>
        </nav>
    </div>

    <main class="container py-5 catalog-page">
        <h1 class="page-title">Каталог коллекционных моделей</h1>
        
        <!-- Поиск и фильтры -->
        <div class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск по названию...">
            
            <div class="filters">
                <select id="filterCategory" class="filter-select">
                    <option value="all">Все категории</option>
                    <option value="treasure">Treasure Hunts</option>
                    <option value="rlk">Red Line Club</option>
                    <option value="premium">Premium</option>
                    <option value="special">Special</option>
                    <option value="standard">Стандартные</option>
                </select>
                
                <select id="filterSort" class="filter-select">
                    <option value="name">По названию</option>
                    <option value="price-asc">По цене (возрастание)</option>
                    <option value="price-desc">По цене (убывание)</option>
                    <option value="rating">По рейтингу</option>
                </select>
            </div>
            
            <div class="active-filters" id="activeFilters"></div>
        </div>
        
        <!-- Товары -->
        <div class="row g-4" id="productsContainer"></div>
    </main>

    <!-- Кнопка переключения темы -->
    <button class="theme-toggle">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Кнопка "На главную" -->
    <a href="index.html" class="back-to-home" title="На главную">
        <i class="fas fa-home"></i>
    </a>

    <!-- Чат поддержки -->
    <div class="chat-widget">
        <button class="chat-toggle">
            <i class="fas fa-comment"></i>
        </button>
        <div class="chat-window">
            <div class="chat-header">
                <i class="fas fa-headset me-2"></i>
                Чат с поддержкой
            </div>
            <div class="chat-messages">
                <div class="message support">
                    <div class="message-bubble">
                        Здравствуйте! Чем мы можем вам помочь?
                    </div>
                </div>
            </div>
            <div class="chat-input">
                <input type="text" placeholder="Введите сообщение...">
                <button class="chat-send">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
