<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выкуп коллекционных моделей</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="logo.png" alt="Hot Wheels Logo" onerror="this.style.display='none'">
                <span>Hot Wheels</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="catalog.html">Каталог</a></li>
                    <li class="nav-item"><a class="nav-link" href="order.html">Предзаказ</a></li>
                    <li class="nav-item"><a class="nav-link active" href="ransom.html">Выкуп</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <h1 class="page-title">Выкуп редких и коллекционных моделей</h1>
        
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="form-container">
                    <form id="ransomForm">
                        <div class="mb-4">
                            <label class="form-label">Название модели</label>
                            <input type="text" class="form-control" placeholder="Например: Treasure Hunt Super" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Год выпуска</label>
                                <input type="text" class="form-control" placeholder="2020">
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Коллекция</label>
                                <input type="text" class="form-control" placeholder="Japan Historics">
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">Фотографии модели</label>
                            <input type="file" class="form-control" multiple accept="image/*">
                            <small class="text-muted d-block mt-2">Загрузите чёткие фото модели и упаковки</small>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">Желаемая цена (₽)</label>
                            <input type="number" class="form-control" placeholder="5000">
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Ваше имя</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Телефон или Email</label>
                                <input type="text" class="form-control" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">Отправить предложение</button>
                        
                        <p class="text-muted text-center mt-4 small">
                            Мы свяжемся с вами в течение 24 часов
                        </p>
                    </form>
                </div>
            </div>
        </div>
        
        <!-- Контакты -->
        <section class="contact-section mt-5">
            <div class="container text-center">
                <h2 class="display-5 mb-5">Контакты</h2>
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <i class="fas fa-phone fa-2x mb-3"></i>
                                <p><a href="tel:+79857392771">8 (985) 739-27-71</a></p>
                            </div>
                            <div class="col-md-6 mb-4">
                                <i class="fas fa-envelope fa-2x mb-3"></i>
                                <p><a href="mailto:Ksafikhanov@list.ru">Ksafikhanov@list.ru</a></p>
                            </div>
                        </div>
                        <div class="mt-4">
                            <i class="fas fa-clock fa-2x mb-3"></i>
                            <p class="fs-4">Ежедневно с 10:00 до 21:00</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Кнопка "На главную" -->
    <a href="index.html" class="back-to-home" title="На главную">
        <i class="fas fa-home"></i>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Плавная прокрутка для кнопки "На главную"
        document.querySelector('.back-to-home').addEventListener('click', function(e) {
            e.preventDefault();
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
            setTimeout(function() {
                window.location.href = 'index.html';
            }, 300);
        });

        // Обработка формы
        document.getElementById('ransomForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Спасибо! Мы рассмотрим ваше предложение и свяжемся с вами.');
        });
    </script>
</body>
</html>
