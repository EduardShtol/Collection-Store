<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Предзаказ Hot Wheels из Америки и Китая</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- НАШ НОВЫЙ CSS ФАЙЛ -->
    <link href="style.css" rel="stylesheet">
    <!-- ВЕСЬ СТАРЫЙ CSS ВНУТРИ <style> НУЖНО УДАЛИТЬ! -->
</head>
<body>

<!-- НАВИГАЦИОННОЕ МЕНЮ (с логотипом) -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <!-- Логотип (текстовый + иконка) -->
         <a href="main.html">
    <img src="log.jpg" alt="Логотип" style="max-height: 50px;">
</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
    </div>
</nav>

<main>
    <!-- Заголовок страницы -->
    <section class="container text-center py-4">
        <h1 class="display-5 fw-bold mt-3">Предзаказ из Америки / Китая</h1>
        <p class="lead text-secondary">Закажите редкие модели, которые ещё не поступили в продажу в России</p>
    </section>

    <!-- Форма предзаказа -->
    <section class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="preorder-form">
                    <form action="#" method="post">
                        <!-- Страна -->
                        <div class="mb-4">
                            <label for="country" class="form-label"><i class="fas fa-globe me-2" style="color:var(--hw-orange);"></i>Страна поставки</label>
                            <select class="form-select" id="country" required>
                                <option value="" selected disabled>Выберите страну</option>
                                <option value="USA">США (Америка)</option>
                                <option value="China">Китай</option>
                            </select>
                        </div>

                        <!-- Выбор модели из списка -->
                        <div class="mb-4">
                            <label for="model-select" class="form-label"><i class="fas fa-car me-2" style="color:var(--hw-orange);"></i>Выберите модель из списка</label>
                            <select class="form-select" id="model-select">
                                <option value="" selected disabled>— Выберите популярную модель —</option>
                                <option value="Treasure Hunt">Treasure Hunt (серия)</option>
                                <option value="Japan Historics">Japan Historics 3</option>
                                <option value="Batmobile Tumbler">Batmobile Tumbler</option>
                                <option value="Mario Kart Standard">Mario Kart Standard</option>
                                <option value="Ford GT40">Ford GT40</option>
                                <option value="Hot Wheels ID">Hot Wheels ID</option>
                                <option value="HW Race Day">HW Race Day</option>
                                <option value="Fast & Furious">Fast & Furious (любая)</option>
                            </select>
                        </div>

                        <!-- Поле ввода своей модели -->
                        <div class="mb-4">
                            <label for="custom-model" class="form-label"><i class="fas fa-pen me-2" style="color:var(--hw-orange);"></i>Или укажите свою модель (если не нашли в списке)</label>
                            <input type="text" class="form-control" id="custom-model" placeholder="Например: 2022 Ford Mustang Shelby GT500">
                        </div>

                        <!-- Контактные данные -->
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label for="name" class="form-label"><i class="fas fa-user me-2" style="color:var(--hw-orange);"></i>Ваше имя</label>
                                <input type="text" class="form-control" id="name" placeholder="Иван Иванов" required>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label for="contact" class="form-label"><i class="fas fa-phone me-2" style="color:var(--hw-orange);"></i>Email или телефон</label>
                                <input type="text" class="form-control" id="contact" placeholder="+7 (___) ___-__-__ или email@example.com" required>
                            </div>
                        </div>

                        <!-- Кнопка отправки -->
                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-outline-hw px-5">Оформить предзаказ <i class="fas fa-paper-plane ms-2"></i></button>
                        </div>

                        <p class="text-muted small text-center mt-4 mb-0">После отправки мы свяжемся с вами для уточнения деталей и предоплаты (при необходимости).</p>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Контактная информация (для удобства) -->
    <section id="contacts" class="container py-4">
        <h2 class="section-title">Контакты</h2>
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="contact-info text-center">
                    <i class="fas fa-store-alt fa-3x mb-4" style="color:var(--hw-orange);"></i>
                    <p class="fs-4 mb-3">ИП Сафиханов Камиль Рустамович</p>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <i class="fas fa-phone-alt me-2" style="color:var(--hw-orange);"></i>
                            <a href="tel:+79857392771">8 (985) 739-27-71</a>
                        </div>
                        <div class="col-md-6 mb-3">
                            <i class="fas fa-envelope me-2" style="color:var(--hw-orange);"></i>
                            <a href="mailto:Ksafikhanov@list.ru">Ksafikhanov@list.ru</a>
                        </div>
                    </div>
                    <hr class="my-4 bg-white opacity-25">
                    <p class="mb-0"><i class="fas fa-clock me-2"></i> Ежедневно с 10:00 до 21:00</p>
                </div>
            </div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
