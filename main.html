<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Wheels Store</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: white;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #ff0000;
            text-align: center;
            margin: 30px 0;
        }
        .card {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Hot Wheels Store 🔥</h1>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <h3>Treasure Hunt</h3>
                    <p>Цена: 599 ₽</p>
                    <button class="btn btn-primary">Купить</button>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <h3>BMW M3 E46</h3>
                    <p>Цена: 1 290 ₽</p>
                    <button class="btn btn-primary">Купить</button>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <h3>Nissan Skyline</h3>
                    <p>Цена: 1 990 ₽</p>
                    <button class="btn btn-primary">Купить</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
