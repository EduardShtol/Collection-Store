<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - Hot Wheels</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="logo.png" alt="Hot Wheels Logo" onerror="this.style.display='none'">
                <span>Hot Wheels</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="catalog.html">Каталог</a></li>
                    <li class="nav-item"><a class="nav-link" href="order.html">Предзаказ</a></li>
                    <li class="nav-item"><a class="nav-link" href="ransom.html">Выкуп</a></li>
                </ul>
                <div class="nav-icons">
                    <a href="favorites.html" class="nav-icon">
                        <i class="far fa-heart"></i>
                        <span class="badge favorites-count">0</span>
                    </a>
                    <a href="cart.html" class="nav-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="badge cart-count">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Хлебные крошки -->
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="index.html">Главная</a></li>
                <li class="breadcrumb-item active">Корзина</li>
            </ol>
        </nav>
    </div>

    <main class="container py-5 cart-page">
        <h1 class="page-title">Корзина</h1>
        
        <div class="row">
            <!-- Товары в корзине -->
            <div class="col-lg-8">
                <div id="cartItems"></div>
            </div>
            
            <!-- Итоговая сумма -->
            <div class="col-lg-4">
                <div class="cart-summary" id="cartSummary">
                    <h3 class="mb-4">Ваш заказ</h3>
                    
                    <div class="d-flex justify-content-between mb-3">
                        <span>Товары:</span>
                        <span id="cartItemsCount">0</span>
                    </div>
                    
                    <div class="d-flex justify-content-between mb-3">
                        <span>Доставка:</span>
                        <span>Бесплатно</span>
                    </div>
                    
                    <hr>
                    
                    <div class="cart-total">
                        <span>Итого:</span>
                        <span id="cartTotal">0 ₽</span>
                    </div>
                    
                    <button class="checkout-btn mt-4" onclick="showNotification('Заказ оформлен! Скоро мы свяжемся с вами', 'success')">
                        Оформить заказ
                    </button>
                    
                    <p class="text-muted text-center mt-3 small">
                        Нажимая кнопку, вы соглашаетесь с условиями обработки данных
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Кнопка переключения темы -->
    <button class="theme-toggle">
        <i class="fas fa-moon"></i>
    </button>

    <!-- Кнопка "На главную" -->
    <a href="index.html" class="back-to-home" title="На главную">
        <i class="fas fa-home"></i>
    </a>

    <!-- Чат поддержки -->
    <div class="chat-widget">
        <button class="chat-toggle">
            <i class="fas fa-comment"></i>
        </button>
        <div class="chat-window">
            <div class="chat-header">
                <i class="fas fa-headset me-2"></i>
                Чат с поддержкой
            </div>
            <div class="chat-messages">
                <div class="message support">
                    <div class="message-bubble">
                        Здравствуйте! Чем мы можем вам помочь?
                    </div>
                </div>
            </div>
            <div class="chat-input">
                <input type="text" placeholder="Введите сообщение...">
                <button class="chat-send">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
